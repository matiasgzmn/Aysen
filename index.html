<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiencias de Aysén - Turismo Sostenible</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>🏔️ Experiencias de Aysén</h1>
        <p>Descubre el turismo sostenible de la Patagonia</p>
    </header>

    <nav class="filtros">
        <button class="filtro activo" data-categoria="Todos">Todos</button>
        <button class="filtro" data-categoria="Navegación">⛵ Navegación</button>
        <button class="filtro" data-categoria="Trekking">🥾 Trekking</button>
        <button class="filtro" data-categoria="Pesca">🎣 Pesca</button>
        <button class="filtro" data-categoria="Cultura">🏛️ Cultura</button>
    </nav>

    <main>
        <section id="experiencias" class="galeria">
            <!-- Las tarjetas se generan aquí con JavaScript -->
        </section>

        <section class="reserva-contenedor">
            <h2>📋 Formulario de Reserva</h2>
            <form id="formularioReserva">
                <div class="grupo-form">
                    <label for="nombre">Nombre Completo:</label>
                    <input type="text" id="nombre" required>
                    <span class="error" id="errorNombre"></span>
                </div>

                <div class="grupo-form">
                    <label for="email">Email:</label>
                    <input type="email" id="email" required>
                    <span class="error" id="errorEmail"></span>
                </div>

                <div class="grupo-form">
                    <label for="experiencia">Selecciona una Experiencia:</label>
                    <select id="experiencia" required>
                        <option value="">-- Elige una experiencia --</option>
                    </select>
                    <span class="error" id="errorExperiencia"></span>
                </div>

                <div class="grupo-form">
                    <label for="personas">Número de Personas:</label>
                    <input type="number" id="personas" min="1" required>
                    <span class="error" id="errorPersonas"></span>
                </div>

                <div class="grupo-form">
                    <label for="fecha">Fecha:</label>
                    <input type="date" id="fecha" required>
                    <span class="error" id="errorFecha"></span>
                </div>

                <button type="submit" class="boton-enviar">Reservar Experiencia</button>
                <div id="mensajeExito" class="mensaje-exito"></div>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 Experiencias de Aysén. Turismo Sostenible en la Patagonia.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
